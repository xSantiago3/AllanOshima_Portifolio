name: Deploy to Firebase Hosting

# Keyless deploy via Workload Identity Federation (no long-lived service-account key).
# Repo variables (Settings > Secrets and variables > Actions > Variables):
#   FIREBASE_PROJECT_ID   = allan-oshima-portfolio
#   WIF_PROVIDER          = projects/<num>/locations/global/workloadIdentityPools/github-pool/providers/github-provider
#   WIF_SERVICE_ACCOUNT   = gh-hosting-deployer@allan-oshima-portfolio.iam.gserviceaccount.com

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  id-token: write # required for OIDC / Workload Identity Federation

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build

      - name: Authenticate to Google Cloud (keyless)
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ vars.FIREBASE_PROJECT_ID }}
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      # Production deploy on push to main
      - name: Deploy (live)
        if: github.event_name == 'push'
        run: npx -y firebase-tools deploy --only hosting --project ${{ vars.FIREBASE_PROJECT_ID }} --non-interactive

      # Ephemeral preview channel on PRs
      - name: Deploy (preview)
        if: github.event_name == 'pull_request'
        run: npx -y firebase-tools hosting:channel:deploy "pr-${{ github.event.number }}" --project ${{ vars.FIREBASE_PROJECT_ID }} --expires 7d --non-interactive
